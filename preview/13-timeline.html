<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; }
  .timeline { position: relative; padding-left: 2rem; margin-top: 14px; }
  .timeline::before {
    content: ''; position: absolute; left: 0; top: 6px; bottom: 6px; width: 2px;
    background: #8B6D4B;
  }
  .item { position: relative; padding-bottom: 14px; }
  .item:last-child { padding-bottom: 0; }
  .item::before {
    content: ''; position: absolute; left: -2.4rem; top: 4px; width: 14px; height: 14px;
    border-radius: 50%; background: #fff; border: 3px solid #8B6D4B;
  }
  .item.fieb::before { border-color: #1A2744; box-shadow: 0 0 0 4px rgba(26,39,68,0.1); }
  .item .year {
    font-family: 'DM Serif Display', serif; font-size: 20px; color: #325591; line-height: 1;
  }
  .item.fieb .year { color: #E8A800; }
  .item p { font-size: 12px; color: #444; margin: 2px 0 0; }
</style>
</head>
<body>
  <div class="row" style="justify-content: space-between; align-items: baseline;">
    <span class="label">Timeline pattern</span>
    <span class="mono">.timeline</span>
  </div>

  <div class="timeline">
    <div class="item">
      <div class="year">2020</div>
      <p>Primera versión virtual del FIEB — respuesta a la contingencia mundial.</p>
    </div>
    <div class="item fieb">
      <div class="year">2022</div>
      <p>III Festival en Funza — retorno presencial y encuentro de maestros.</p>
    </div>
    <div class="item">
      <div class="year">2025</div>
      <p>V Festival — expansión territorial con sede en Cota, Colombia.</p>
    </div>
  </div>
</body>
</html>
