<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; background: #F4F4F2; color: #1A2744; }
  .palette-row { display: flex; gap: 10px; margin-top: 14px; }
  .group-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #1A2744; font-weight: 700; margin-bottom: 2px; }
  .group-sub { font-size: 11px; color: #334155; }
</style>
</head>
<body>
  <div class="row" style="justify-content: space-between; align-items: baseline;">
    <div>
      <div class="group-label">FIEB · festival theme</div>
      <div class="group-sub">Editorial light · navy + gold accent only</div>
    </div>
    <div class="mono">.fieb-theme</div>
  </div>

  <div class="palette-row">
    <div class="swatch" style="background:#1A2744; color:#fff;">
      <div class="name">Primary<br>Navy</div>
      <div class="hex">#1A2744</div>
    </div>
    <div class="swatch" style="background:#2A3E6E; color:#fff;">
      <div class="name">Blue Sec<br>Mid Navy</div>
      <div class="hex">#2A3E6E</div>
    </div>
    <div class="swatch" style="background:#E8A800; color:#1A2744;">
      <div class="name">Accent<br>Vivid Gold</div>
      <div class="hex">#E8A800</div>
    </div>
    <div class="swatch" style="background:#E8E8E5; color:#1A2744;">
      <div class="name">Silver Light<br>Section bg</div>
      <div class="hex">#E8E8E5</div>
    </div>
    <div class="swatch bordered" style="background:#F4F4F2; color:#1A2744;">
      <div class="name">Page Bg<br>Warm Off-white</div>
      <div class="hex">#F4F4F2</div>
    </div>
  </div>
</body>
</html>
