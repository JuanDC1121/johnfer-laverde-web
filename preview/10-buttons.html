<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; }
  .btn-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 14px; }
  .btn {
    display: inline-block; padding: 14px 32px; font-family: 'Raleway', sans-serif;
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    border-radius: 50px; text-decoration: none; cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid transparent;
  }
  /* Johnfer primary (bronze) */
  .btn-jhonfer { background: #8B6D4B; color: #fff; box-shadow: 0 4px 15px rgba(139,109,75,0.4); border-color: #8B6D4B; }
  /* FIEB (gold on light) */
  .btn-fieb { background: #E8A800; color: #1A2744; box-shadow: 0 4px 15px rgba(232,168,0,0.2); border-color: #E8A800; }
  /* Fundación (deep gold) */
  .btn-fund { background: #C9912B; color: #0D1B2A; box-shadow: 0 0 15px rgba(201,145,43,0.2); border-color: #C9912B; }
  /* Outline */
  .btn-outline { background: transparent; color: #325591; border-color: #325591; }
  .role { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #888; font-weight: 600; margin-bottom: 4px; }
</style>
</head>
<body>
  <div class="label">Buttons · pill, uppercase, tracked</div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; margin-top: 14px;">
    <div>
      <div class="role">Johnfer primary</div>
      <a class="btn btn-jhonfer">Conoce mi trabajo</a>
    </div>
    <div>
      <div class="role">FIEB primary</div>
      <a class="btn btn-fieb">Inscríbete</a>
    </div>
    <div>
      <div class="role">Fundación primary</div>
      <a class="btn btn-fund">Conoce los proyectos</a>
    </div>
    <div>
      <div class="role">Outline (any theme)</div>
      <a class="btn btn-outline">Más información</a>
    </div>
  </div>

  <div style="margin-top: 16px; font-size: 11px; color: #666; line-height: 1.5;">
    All buttons share: pill radius (50px), uppercase, 1px tracking, hover lifts <span class="mono">translateY(-3px)</span> + brighter shadow.
  </div>
</body>
</html>
