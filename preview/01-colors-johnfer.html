<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; }
  .palette-row { display: flex; gap: 10px; margin-top: 14px; }
  .palette-row .swatch { min-height: 88px; }
  .group-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #325591; font-weight: 700; margin-bottom: 2px; }
  .group-sub { font-size: 11px; color: #888; }
</style>
</head>
<body>
  <div class="row" style="justify-content: space-between; align-items: baseline;">
    <div>
      <div class="group-label">Johnfer Laverde · primary brand</div>
      <div class="group-sub">Institutional blue + warm bronze · default theme</div>
    </div>
    <div class="mono">--color-*</div>
  </div>

  <div class="palette-row">
    <div class="swatch" style="background:#325591; color:#fff;">
      <div class="name">Primary<br>Institutional Blue</div>
      <div class="hex">#325591</div>
    </div>
    <div class="swatch" style="background:#1F355C; color:#fff;">
      <div class="name">Dark<br>Deep Navy</div>
      <div class="hex">#1F355C</div>
    </div>
    <div class="swatch" style="background:#8B6D4B; color:#fff;">
      <div class="name">Accent<br>Warm Bronze</div>
      <div class="hex">#8B6D4B</div>
    </div>
    <div class="swatch" style="background:#B6CBE8; color:#1F355C;">
      <div class="name">Secondary<br>Sky Blue</div>
      <div class="hex">#B6CBE8</div>
    </div>
    <div class="swatch bordered" style="background:#FFFFFF; color:#1A2744;">
      <div class="name">White<br>Surface</div>
      <div class="hex">#FFFFFF</div>
    </div>
  </div>
</body>
</html>
