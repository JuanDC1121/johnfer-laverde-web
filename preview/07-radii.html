<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; }
  .radius-row { display: flex; gap: 16px; align-items: flex-end; margin-top: 12px; }
  .radius-box {
    flex: 1; aspect-ratio: 1.3; background: #325591;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #fff;
  }
  .radius-box .v { font-family: 'DM Serif Display', serif; font-size: 22px; line-height: 1; }
  .radius-box .n { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; opacity: 0.7; margin-top: 4px; }
</style>
</head>
<body>
  <div class="row" style="justify-content: space-between; align-items: baseline;">
    <span class="label">Corner radii</span>
    <span class="mono">--radius-*</span>
  </div>

  <div class="radius-row">
    <div class="radius-box" style="border-radius: 6px;"><span class="v">6</span><span class="n">sm · inputs</span></div>
    <div class="radius-box" style="border-radius: 12px;"><span class="v">12</span><span class="n">md · cards</span></div>
    <div class="radius-box" style="border-radius: 20px;"><span class="v">20</span><span class="n">lg · panels</span></div>
    <div class="radius-box" style="border-radius: 50px;"><span class="v">∞</span><span class="n">pill · ctas</span></div>
  </div>

  <div style="margin-top: 14px; font-size: 11px; color: #666; line-height: 1.5;">
    All call-to-action buttons use the <strong>pill</strong> radius — never square, never sm/md. Cards and form controls follow md and sm respectively.
  </div>
</body>
</html>
