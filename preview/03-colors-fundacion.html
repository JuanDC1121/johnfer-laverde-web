<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; background: #0D1B2A; color: #FAF4E4; }
  .palette-row { display: flex; gap: 10px; margin-top: 14px; }
  .group-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #F5C842; font-weight: 700; margin-bottom: 2px; }
  .group-sub { font-size: 11px; color: #E8B84B; }
  .mono { color: rgba(232,184,75,0.7); }
</style>
</head>
<body>
  <div class="row" style="justify-content: space-between; align-items: baseline;">
    <div>
      <div class="group-label">Latido Panches · fundación theme</div>
      <div class="group-sub">Premium dark · cream on near-black · gold glow</div>
    </div>
    <div class="mono">.fundacion-theme</div>
  </div>

  <div class="palette-row">
    <div class="swatch" style="background:#0D1B2A; color:#FAF4E4; border: 1px solid rgba(245,200,66,0.2);">
      <div class="name">Primary<br>Deep Navy</div>
      <div class="hex">#0D1B2A</div>
    </div>
    <div class="swatch" style="background:#122233; color:#FAF4E4;">
      <div class="name">Secondary<br>Alt Section</div>
      <div class="hex">#122233</div>
    </div>
    <div class="swatch" style="background:#1C3046; color:#FAF4E4;">
      <div class="name">Card Surface<br>Elevated</div>
      <div class="hex">#1C3046</div>
    </div>
    <div class="swatch" style="background:#F5C842; color:#0D1B2A;">
      <div class="name">Accent<br>Bright Gold</div>
      <div class="hex">#F5C842</div>
    </div>
    <div class="swatch" style="background:#C9912B; color:#0D1B2A;">
      <div class="name">Accent Deep<br>Button Gold</div>
      <div class="hex">#C9912B</div>
    </div>
  </div>
</body>
</html>
